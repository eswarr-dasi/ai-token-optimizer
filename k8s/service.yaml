apiVersion: v1
kind: Service
metadata:
  name: ai-token-optimizer
  namespace: ai-platform
  labels:
    app: ai-token-optimizer
spec:
  selector:
    app: ai-token-optimizer
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-token-optimizer-ingress
  namespace: ai-platform
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - host: token-optimizer.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ai-token-optimizer
                port:
                  number: 80
