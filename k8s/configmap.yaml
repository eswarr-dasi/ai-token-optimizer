apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-token-optimizer-config
  namespace: ai-platform
data:
  SPRING_PROFILES_ACTIVE: "docker"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  TOKEN_OPTIMIZER_CACHE_ENABLED: "true"
  TOKEN_OPTIMIZER_CACHE_SIMILARITY_THRESHOLD: "0.92"
  TOKEN_OPTIMIZER_CACHE_TTL_HOURS: "24"
  TOKEN_OPTIMIZER_ROUTING_STRATEGY: "CONFIDENCE_BASED"
  TOKEN_OPTIMIZER_ROUTING_CONFIDENCE_THRESHOLD: "0.85"
  TOKEN_OPTIMIZER_COMPRESSION_ENABLED: "true"
  TOKEN_OPTIMIZER_COMPRESSION_TARGET_REDUCTION: "0.20"
