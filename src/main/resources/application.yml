spring:
  application:
    name: ai-token-optimizer

  datasource:
    url: jdbc:postgresql://localhost:5432/tokenoptimizer
    username: ${DB_USER:tokenoptimizer}
    password: ${DB_PASS:tokenoptimizer}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:}
      timeout: 2000ms

  flyway:
    enabled: true
    locations: classpath:db/migration

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      embedding:
        options:
          model: text-embedding-3-small

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true
  endpoint:
    health:
      show-details: always

# AI Token Optimizer configuration
token-optimizer:
  cache:
    enabled: true
    similarity-threshold: 0.92   # 0.0-1.0; higher = stricter matching
    ttl-hours: 24
  routing:
    strategy: CONFIDENCE_BASED   # COST_FIRST | QUALITY_FIRST | CONFIDENCE_BASED
    confidence-threshold: 0.85
  budget:
    default-daily-limit: 100000  # tokens per team per day
    alert-threshold: 0.80
  compression:
    enabled: true
    target-reduction: 0.20
  providers:
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: https://api.openai.com/v1
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}

logging:
  level:
    com.eswarr.tokenoptimizer: DEBUG
    org.springframework.data.redis: WARN
    org.hibernate.SQL: WARN
